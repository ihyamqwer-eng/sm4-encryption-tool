<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SM4 Encryption Tool</title>
    <script src="/static/sm4_ui.js"></script>
</head>
<body>
    <h1>SM4 Encryption Tool</h1>
    <div id="content">
        <section>
            <h2>Upload Encrypted File</h2>
            <form id="upload-form" enctype="multipart/form-data">
                <input type="file" name="file" required>
                <button type="submit">Upload</button>
            </form>
        </section>
        <section>
            <h2>Encrypted Files</h2>
            <ul id="file-list">
                <li>Loading...</li>
            </ul>
        </section>
        <section>
            <h2>Decrypt File</h2>
            <form id="decrypt-form" enctype="multipart/form-data">
                <input type="file" name="file" required>
                <input type="file" name="key" required>
                <button type="submit">Decrypt</button>
            </form>
        </section>
    </div>
</body>
</html>
